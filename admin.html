<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Admin</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-body">
  <div class="app-frame admin-frame">
    <header class="app-header">
      <div>
        <p class="eyebrow">Admin editor</p>
        <h1>Inventory Admin</h1>
        <p class="header-copy">Update platoon equipment, photos, locations, and counts.</p>
      </div>
      <div class="header-actions">
        <a class="btn btn-secondary" href="index.html">
          <i data-lucide="clipboard-list" aria-hidden="true"></i>
          <span>View inventory</span>
        </a>
      </div>
    </header>

    <div id="appPanel" class="hidden">
      <div class="admin-toolbar">
        <div class="toolbar-inner">
          <div class="toolbar-group">
            <select id="platoonSelect" class="select toolbar-select" aria-label="Platoon"></select>
            <button id="saveBtn" class="btn btn-primary">
              <i data-lucide="save" aria-hidden="true"></i>
              <span>Save</span>
            </button>
            <button id="addItemBtn" class="btn btn-accent">
              <i data-lucide="plus" aria-hidden="true"></i>
              <span>Add item</span>
            </button>
            <input id="adminCameraInput" class="hidden" type="file" accept="image/*" capture="environment" />
            <input id="adminFileInput" class="hidden" type="file" accept="application/pdf,.pdf" />
            <button id="scanItemBtn" class="btn btn-secondary">
              <i data-lucide="scan-text" aria-hidden="true"></i>
              <span>Scan paper</span>
            </button>
            <button id="uploadDocBtn" class="btn btn-secondary">
              <i data-lucide="file-up" aria-hidden="true"></i>
              <span>Upload PDF</span>
            </button>
          </div>

          <div class="toolbar-group">
            <details class="action-menu">
              <summary class="btn btn-secondary">
                <i data-lucide="more-horizontal" aria-hidden="true"></i>
                <span>More</span>
              </summary>
              <div class="menu-panel">
                <button id="addPlatoonBtn" class="btn btn-secondary">
                  <i data-lucide="users-round" aria-hidden="true"></i>
                  <span>Add platoon</span>
                </button>
                <button id="changePwBtn" class="btn btn-secondary">
                  <i data-lucide="key-round" aria-hidden="true"></i>
                  <span>Change password</span>
                </button>
                <button id="signOutBtn" class="btn btn-secondary">
                  <i data-lucide="log-out" aria-hidden="true"></i>
                  <span>Sign out</span>
                </button>
                <button id="deletePlatoonBtn" class="btn btn-danger-soft">
                  <i data-lucide="trash-2" aria-hidden="true"></i>
                  <span>Delete platoon</span>
                </button>
              </div>
            </details>
          </div>

          <div id="status" class="status-text" role="status" aria-live="polite"></div>
        </div>
      </div>

      <div id="itemsContainer" class="admin-item-list"></div>
    </div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop hidden">
    <div id="modalPanel" class="modal-panel"></div>
  </div>

  <script src="ocr.js"></script>
  <script src="admin.js"></script>
</body>
</html>
