name: Coolify Deploy

on:
  push:
    branches:
      - main
    paths:
      - "react-app/**"
      - "backend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/coolify-deploy.yml"
  workflow_dispatch:

concurrency:
  group: coolify-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check monorepo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

  deploy-frontend:
    name: Deploy React app to Coolify
    runs-on: ubuntu-latest
    needs: check
    env:
      COOLIFY_FRONTEND_WEBHOOK_URL: ${{ secrets.COOLIFY_FRONTEND_WEBHOOK_URL || secrets.COOLIFY_WEBHOOK }}
      COOLIFY_DEPLOY_TOKEN: ${{ secrets.COOLIFY_DEPLOY_TOKEN || secrets.COOLIFY_TOKEN }}
    steps:
      - name: Trigger frontend deployment
        if: ${{ env.COOLIFY_FRONTEND_WEBHOOK_URL != '' }}
        run: |
          args=(--fail --request GET --url "$COOLIFY_FRONTEND_WEBHOOK_URL")
          if [ -n "$COOLIFY_DEPLOY_TOKEN" ]; then
            args+=(--header "Authorization: Bearer $COOLIFY_DEPLOY_TOKEN")
          fi
          curl "${args[@]}"

  deploy-backend:
    name: Deploy API to Coolify
    runs-on: ubuntu-latest
    needs: check
    env:
      COOLIFY_BACKEND_WEBHOOK_URL: ${{ secrets.COOLIFY_BACKEND_WEBHOOK_URL }}
      COOLIFY_DEPLOY_TOKEN: ${{ secrets.COOLIFY_DEPLOY_TOKEN || secrets.COOLIFY_TOKEN }}
    steps:
      - name: Trigger backend deployment
        if: ${{ env.COOLIFY_BACKEND_WEBHOOK_URL != '' }}
        run: |
          args=(--fail --request GET --url "$COOLIFY_BACKEND_WEBHOOK_URL")
          if [ -n "$COOLIFY_DEPLOY_TOKEN" ]; then
            args+=(--header "Authorization: Bearer $COOLIFY_DEPLOY_TOKEN")
          fi
          curl "${args[@]}"
