<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equipment Inventory</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-body">
  <div id="passwordPrompt" class="auth-screen">
    <section class="auth-card" aria-labelledby="loginTitle">
      <p class="eyebrow">Guard equipment accountability</p>
      <h1 id="loginTitle">Equipment Inventory</h1>
      <p class="auth-copy">Select your platoon and open the latest equipment list.</p>

      <div class="form-stack">
        <label class="field-label" for="platoonSelect">Platoon</label>
        <select id="platoonSelect" class="select"></select>

        <label class="field-label" for="passwordInput">Password</label>
        <input
          type="password"
          id="passwordInput"
          class="input"
          placeholder="Password..."
        />

        <button
          id="submitBtn"
          class="btn btn-primary btn-full"
        >
          <i data-lucide="log-in" aria-hidden="true"></i>
          <span>Open inventory</span>
        </button>

        <div id="loginStatus" class="status-text" role="status" aria-live="polite"></div>
      </div>
    </section>
  </div>

  <div id="mainContent" class="hidden app-frame">
    <header class="app-header">
      <div>
        <p class="eyebrow">Platoon inventory</p>
        <h1 id="pageTitle">Equipment Inventory</h1>
        <p class="header-copy">Fast lookup for what is on hand and where it is staged.</p>
      </div>
      <div class="header-actions">
        <label class="search-wrap" for="searchInput">
          <i data-lucide="search" aria-hidden="true"></i>
          <input id="searchInput" class="input search-input" type="search" placeholder="Search packet item, LIN, NSN..." />
        </label>
        <input id="packetCameraInput" class="hidden" type="file" accept="image/*" capture="environment" />
        <input id="packetFileInput" class="hidden" type="file" accept="application/pdf,.pdf" />
        <button id="scanPacketBtn" class="btn btn-accent">
          <i data-lucide="scan-text" aria-hidden="true"></i>
          <span>Scan paper</span>
        </button>
        <button id="uploadPacketBtn" class="btn btn-secondary">
          <i data-lucide="file-up" aria-hidden="true"></i>
          <span>Upload PDF</span>
        </button>
        <button id="changePlatoonBtn" class="btn btn-secondary">
          <i data-lucide="repeat-2" aria-hidden="true"></i>
          <span>Change platoon</span>
        </button>
      </div>
    </header>
    <div id="scanStatus" class="status-text scan-status" role="status" aria-live="polite"></div>

    <section class="summary-strip" aria-label="Inventory summary">
      <div class="summary-item">
        <span id="totalItemsCount" class="summary-value">0</span>
        <span class="summary-label">Items tracked</span>
      </div>
      <div class="summary-item">
        <span id="visibleItemsCount" class="summary-value">0</span>
        <span class="summary-label">Currently shown</span>
      </div>
      <div class="summary-item">
        <span id="imageItemsCount" class="summary-value">0</span>
        <span class="summary-label">With photos</span>
      </div>
    </section>

    <div id="itemsContainer" class="inventory-grid"></div>
  </div>

  <script src="ocr.js"></script>
  <script src="script.js"></script>
</body>
</html>
